<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>恋爱测试</title>
</head>
<style>
    .button{
        position: relative;
        left: 50%;
    }
</style>
<script>
    var startTest = function(){
        var image = document.getElementById("image");
        image.setAttribute("style","background:black;height: 500px;margin: auto;margin-top: 15vh;");
        var button=document.getElementById("button").style.display="none";
    }
    startTest("button");
</script>
<body>
    <div id="image" class="image"><a href=""></a></div>
    <button class="button" onclick="startTest()"id ="button">开始测试</button>
</body>
</html>
